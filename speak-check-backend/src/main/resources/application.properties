spring.application.name=speak-check

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.ai.openai.api-key=${OPENAI_API_KEY}

app.jwt.secret =${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION}

app.s3.endpoint=${RAILWAY_S3_ENDPOINT}
app.s3.bucket=${RAILWAY_S3_BUCKET}
app.s3.accessKey=${RAILWAY_S3_ACCESS_KEY}
app.s3.secretKey=${RAILWAY_S3_SECRET_KEY}
app.s3.region=${RAILWAY_S3_REGION}